aid: provet-cloud
name: Provet Cloud
review:
  question: Does Provet Cloud expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Provet Cloud's public developer surface
    (developers.provetcloud.com) is a request/response REST API over HTTPS at
    https://provetcloud.com/<provet_id>/api/0.1/. Its only asynchronous,
    server-initiated mechanism is outbound webhooks: Provet Cloud POSTs an HTTP
    request carrying the changed object's ID to a URL the integration configures,
    and retries up to 10 times. That is server-to-endpoint HTTP, not a WebSocket
    or SSE stream the client connects to, so there is no bidirectional/streaming
    transport on Provet Cloud's own API to model in AsyncAPI.
findings:
  summary: |
    Provet Cloud does not publish a documented public WebSocket API. Provet Cloud
    is a cloud veterinary practice management system (PIMS) by Nordhealth. It
    exposes a documented, browsable REST API (version 0.1) at
    https://provetcloud.com/<provet_id>/api/0.1/ (installation-specific; regional
    domains include us.provetcloud.com and enterprise.provetcloud.com) returning
    JSON. Authorization is OAuth 2.0 - Client Credentials for backend services and
    Authorization Code with PKCE for user-facing apps - via
    https://provetcloud.com/<provet_id>/oauth2/token/ with the "restapi" scope; a
    legacy "Authorization: Token <key>" header exists but is deprecated.
    Integrations must be registered and approved by Provet's support team per
    installation, so it is best described as a documented partner/customer API
    rather than a fully self-serve public one. The asynchronous surface is
    outbound webhooks (60+ triggers), which are HTTP POST callbacks, not a
    WebSocket. No ws:// or wss:// endpoint is documented anywhere in the Provet
    Cloud developer documentation as of the review date.
  documentedApi: |
    Public, freely browsable docs at https://developers.provetcloud.com/restapi/.
    Real REST resources confirmed from the how-to and reference pages include:
    /client/, /patient/ (incl. /patient/bulk/), /phonenumber/, /consultation/
    (with /update_status/, /mark_sent/, and sub-resources medicines, procedures,
    supplies, foods, consultationdiagnosis, consultationnote,
    consultationdischargeinstruction), /consultationitem/, /appointment/ (with
    /send_appointment_confirmation/), /appointment_reminder/, /onlinebookingclient/,
    /onlinebookingpatient/, /invoice/ (with /full_refund/ and /partial_refund/),
    /invoicerow/, /invoicepayment/ (with /cancel_payment/), /unallocatedpayment/,
    /item/, /department/, /reason/, /user/, /custom_fields/, and code lists
    /codelist/species/, /codelist/breeds/, /codelist/diagnoses/.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://provetcloud.com/{provet_id}/api/0.1/
      documented: true
      note: >-
        Primary API. JSON request/response. OAuth 2.0 (Client Credentials or
        Authorization Code + PKCE), scope "restapi". Regional domains include
        us.provetcloud.com and enterprise.provetcloud.com.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Outbound HTTP POST callbacks for 60+ triggers, carrying the changed
        object's ID; scoped organization-wide or per department; retried up to 10
        times on non-200. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: >-
        No WebSocket endpoint is documented anywhere in the Provet Cloud REST API
        documentation as of the review date.
