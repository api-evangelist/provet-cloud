  endpointsModeled:
    - GET    /api/0.1/webhook/
    - POST   /api/0.1/webhook/
  endpointsModeledNote: >-
    Provet Cloud documents that webhooks can be created in Settings and that
    automating webhook creation via the API is recommended, but the how-to pages
    do not print the exact webhook-management path or body. The /webhook/
    resource path and its request/response schema in the OpenAPI are modeled from
    that documented behavior and should be confirmed against a live installation.
sources:
  - url: https://developers.provetcloud.com/restapi/
    type: Documentation
    note: API overview, JSON, version 0.1, browsable, freely accessible to customers/developers.
  - url: https://developers.provetcloud.com/restapi/authentication_oauth2.html
    type: Documentation
    note: OAuth 2.0 Client Credentials and Authorization Code + PKCE; token endpoint; scopes restapi/openid.
  - url: https://developers.provetcloud.com/restapi/authentication_token.html
    type: Documentation
    note: Legacy API token auth (deprecated); base URL https://provetcloud.com/<provet_id>/api/0.1/.
  - url: https://developers.provetcloud.com/restapi/ratelimit.html
    type: Documentation
    note: Per-endpoint limits, rolling 60s window, HTTP 429 + Retry-After, page-size proportional cost.
  - url: https://developers.provetcloud.com/restapi/howto_clients_patients.html
    type: APIReference
    note: Confirmed /client/, /patient/, /patient/bulk/, /phonenumber/, custom_field_values, codelists.
  - url: https://developers.provetcloud.com/restapi/howto_consultations.html
    type: APIReference
    note: Confirmed /consultation/ and its lifecycle actions and clinical sub-resources.
  - url: https://developers.provetcloud.com/restapi/howto_appointments.html
    type: APIReference
    note: Confirmed /appointment/, online booking, reminders, department/reason/user reference lookups.
  - url: https://developers.provetcloud.com/restapi/howto_billing.html
    type: APIReference
    note: Confirmed /invoice/, /invoicerow/, /invoicepayment/, /unallocatedpayment/ and refund actions.
  - url: https://developers.provetcloud.com/restapi/webhooks.html
    type: Documentation
    note: Outbound HTTP POST webhooks, department/org scope, retried up to 10 times. No WebSocket.
  - url: https://developers.provetcloud.com/restapi/webhook_triggers.html
    type: Documentation
    note: 60+ webhook trigger events across clients, patients, consultations, appointments, invoices, stock, imaging, labs.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Provet Cloud's own API. The public
    API is request/response REST (OAuth 2.0), and its asynchronous behavior is
    delivered through outbound HTTP webhooks rather than a client-connected
    WebSocket/SSE stream. No AsyncAPI document was created because there is no
    server-push socket transport to model; the webhook callbacks are ordinary
    HTTP POSTs already described in the REST documentation.
