serviceCategory: Business Application Software (Veterinary PIMS)
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Provet Cloud
  ServiceCategory: Business Application Software
  ProviderName: Provet Cloud
  PublisherName: Nordhealth
  InvoiceIssuerName: Nordhealth
  BillingCurrency: USD
  ChargeCategory: Purchase
