meters:
- name: veterinarian_seats
  description: Number of veterinarians on the practice subscription, the primary billing driver.
  unit: seats
  aggregation: max
  dimensions:
  - installation
  - department
- name: addon_modules
  description: Paid add-on modules and integrations enabled on the subscription.
  unit: modules
  aggregation: sum
  dimensions:
  - installation
- name: provet_pay_transactions
  description: Payment transactions processed through the Provet Pay add-on, billed per transaction.
  unit: transactions
  aggregation: sum
  dimensions:
  - installation
principles:
- name: Visibility
  description: >-
    Track the per-veterinarian seat count and the set of paid add-ons per
    installation; attribute Provet Pay transaction fees to the clinic that
    generated them.
- name: Allocation
  description: >-
    Map subscription and add-on costs to clinics/departments so multi-site
    groups can see cost per location.
- name: Optimization
  description: >-
    Right-size veterinarian seats, retire unused add-ons, and use webhooks
    instead of high-frequency polling to keep integrations efficient within the
    per-endpoint rate limits.
- name: Accountability
  description: >-
    Assign a subscription owner per installation and review seat counts and
    add-on spend against the Nordhealth agreement on each billing cycle.
