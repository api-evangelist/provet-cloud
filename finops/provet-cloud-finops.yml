description: >-
  FinOps view of Provet Cloud spend. Provet Cloud is a SaaS subscription from
  Nordhealth billed primarily per veterinarian per month, plus optional add-ons
  and integrations (Provet Pay, online booking, ERP/accounting, imaging/RIS) and
  custom-quoted enterprise/multi-site agreements. The REST API and webhooks are
  an included capability for approved integration partners, not a separately
  metered line item, so there is no per-call API cost - the cost driver for an
  integration is the underlying practice subscription and any paid add-on modules
  it depends on. Payment-processing add-ons (Provet Pay) carry their own
  transaction-based fees.
notes: >-
  Per-veterinarian and add-on rates are set by Nordhealth sales and are not
  reconciled here. Model API-driven integrations as riding on the existing Provet
  Cloud subscription rather than as usage-metered API spend.
sources:
