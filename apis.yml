    type: APIReference
  - url: openapi/provet-cloud-openapi.yml
    type: OpenAPI
  - url: collections/provet-cloud.postman_collection.json
    type: PostmanCollection
  - url: collections/provet-cloud.opencollection.json
    type: OpenCollection
  description: Manage patients (the animals) linked to clients - list and filter by
    client, name, microchip, species, or modification date, create single patients or
    bulk-create many in one request, patch patient details such as microchip, weight,
    or deceased status, and read or write per-patient custom field values.
