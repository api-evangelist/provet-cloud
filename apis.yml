    type: APIReference
  - url: openapi/provet-cloud-openapi.yml
    type: OpenAPI
  - url: collections/provet-cloud.postman_collection.json
    type: PostmanCollection
  - url: collections/provet-cloud.opencollection.json
    type: OpenCollection
  description: Read invoices and invoice rows, issue full or partial refunds (credit
    notes), record and cancel payments against finalized invoices, and record
    unallocated prepayments and read their available balances. Supports ERP and
    accounting integration back-ends.
- aid: provet-cloud:provet-cloud-items-reference-api
  name: Provet Cloud Items & Reference Data API
  tags:
