  - url: openapi/provet-cloud-openapi.yml
    type: OpenAPI
  - url: collections/provet-cloud.postman_collection.json
    type: PostmanCollection
  - url: collections/provet-cloud.opencollection.json
    type: OpenCollection
  description: Read the master item catalog (medicines, procedures, supplies, foods),
    departments, appointment reasons, users, custom field definitions, and code lists
    (species, breeds, diagnoses) used as reference data when creating clients,
    patients, appointments, and consultations.
- aid: provet-cloud:provet-cloud-webhooks-api
  name: Provet Cloud Webhooks API
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.provetcloud.com/restapi/webhooks.html
  baseURL: https://provetcloud.com/{provet_id}/api/0.1
  properties:
  - url: https://developers.provetcloud.com/restapi/webhooks.html
    type: Documentation
  - url: https://developers.provetcloud.com/restapi/webhook_triggers.html
    type: APIReference
  - url: openapi/provet-cloud-openapi.yml
    type: OpenAPI
  - url: collections/provet-cloud.postman_collection.json
    type: PostmanCollection
  - url: collections/provet-cloud.opencollection.json
    type: OpenCollection
  description: Subscribe to changes in a Provet Cloud installation. Provet Cloud POSTs
    an event (with the changed object's ID) to a configured URL for 60+ triggers
    across clients, patients, consultations, appointments, invoices, stock, imaging,
    labs, and communications; webhooks can be scoped organization-wide or to a
    department and are retried up to 10 times. Webhook subscriptions can be managed via
    the API.
