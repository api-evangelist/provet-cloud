    type: APIReference
  - url: openapi/provet-cloud-openapi.yml
    type: OpenAPI
  - url: collections/provet-cloud.postman_collection.json
    type: PostmanCollection
  - url: collections/provet-cloud.opencollection.json
    type: OpenCollection
  description: Manage clients (the animal owners / bill payers) in a Provet Cloud
    installation - list and filter clients by name, organization, email, or phone,
    create new clients, patch client fields and communication preferences, attach
    phone numbers, and read or write per-client custom field values.
- aid: provet-cloud:provet-cloud-patients-api
  name: Provet Cloud Patients API
  tags:
  - Patients
  - Animals
  - Medical Records
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.provetcloud.com/restapi/howto_clients_patients.html
  baseURL: https://provetcloud.com/{provet_id}/api/0.1
  properties:
