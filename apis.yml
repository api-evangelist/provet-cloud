aid: provet-cloud
url: https://raw.githubusercontent.com/api-evangelist/provet-cloud/refs/heads/main/apis.yml
name: Provet Cloud
kind: company
description: Provet Cloud is a cloud-based veterinary practice management system (PIMS)
  built by Nordhealth for animal clinics, hospitals, and referral practices. It exposes
  a documented REST API (base https://provetcloud.com/<provet_id>/api/0.1/, regional
  domains such as us.provetcloud.com) that gives approved integration partners
  programmatic access to clients, patients (animals), consultations, appointments and
  online booking, invoicing and payments, items, and reference data, plus a webhook
  system with 60+ triggers for reacting to changes in a Provet Cloud installation.
  Access is OAuth 2.0 authorized (Client Credentials for backend services,
  Authorization Code with PKCE for user-facing apps); integrations are registered and
  approved by Provet's support team per installation. The documentation at
  developers.provetcloud.com is freely browsable by any customer or developer.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Veterinary
- Practice Management
- PIMS
- Healthcare
- Nordhealth
- Animal Health
- Appointments
- Billing
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
apis:
- aid: provet-cloud:provet-cloud-clients-api
  name: Provet Cloud Clients API
  tags:
  - Clients
  - Owners
  - CRM
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
